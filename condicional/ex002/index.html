<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pode ou não dirigir?</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <h1>Pode ou não dirigir?</h1>
    <p>DIGIJA COM RESPONSABILIDADE!</p>

    <script>
        let idade = Number(prompt("Digite sua idade:"));
        if(idade >= 18){
            alert("Você já pode dirigir! 👍");
        } else {
            alert("Você ainda é menor de idade e não pode dirigir. Espere um pouco mais, OK? 😉");
        }
    </script>
    
</body>
</html>
