<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificação do IMC</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <h1>Classificação do IMC</h1>
    <p>Saúde em primeiro lugar!</p>

<script>
    let peso = Number(prompt("Digite seu peso em kg:"));
    let altura = Number(prompt("Digite sua altura em metros:"));
    let imc = peso / (altura * altura);

    if (imc < 18.5) {
        alert("Seu IMC é " + imc.toFixed(2) + " - Abaixo do peso");
    } else if (imc >= 18.5 && imc < 24.9) {
        alert("Seu IMC é " + imc.toFixed(2) + " - Peso normal");
    } else if (imc >= 25.0 && imc < 29.9) {
        alert("Seu IMC é " + imc.toFixed(2) + " - Sobrepeso");
    } else if (imc >= 30) {
        alert("Seu IMC é " + imc.toFixed(2) + " - Obesidade");
    }
</script>

</body>
</html>
