<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu da Semana</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    
  <h1>Menu da Semana</h1>
  <p>Quantas semanas tem em um ano? 🤔</p>
    
   <script>
      let numero = Number(prompt("Digite um número de 1 a 7:"));
    
      switch (numero) {
      case 1:
        alert("Domingo");
        break;
      case 2:
        alert("Segunda-feira");
        break;
      case 3:
        alert("Terça-feira");
        break;
      case 4:
        alert("Quarta-feira");
         break;
      case 5:
        alert("Quinta-feira");
        break;
      case 6:
        alert("Sexta-feira");
        break;
      case 7:
        alert("Sábado");
        break;
      default:
        alert("Número inválido! Por favor, digite um número entre 1 e 7.");
        }
    </script>

</body>
</html>
