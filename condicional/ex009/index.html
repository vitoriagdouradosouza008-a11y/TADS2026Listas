<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de 4 Operações</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    
  <h1>Calculadora de 4 Operações</h1>
  <p>A Matemática poede ser legal as vezes!</p>

    <script>
      let num1 = Number(prompt("Digite o primeiro número:"));
      let operacao = prompt("Digite a operação desejada (+, -, *, /):");
      let num2 = Number(prompt("Digite o segundo número:"));

      let resultado;

      switch (operacao) {
        case "+":
          resultado = num1 + num2;
          alert(`O resultado da adição é: ${resultado}`);
          break;
        case "-":
          resultado = num1 - num2;
          alert(`O resultado da subtração é: ${resultado}`);
          break;
        case "*":
          resultado = num1 * num2;
          alert(`O resultado da multiplicação é: ${resultado}`);
          break;
        case "/":
          if (num2 !== 0) {
            resultado = num1 / num2;
            alert(`O resultado da divisão é: ${resultado}`);
          } else {
            alert("Erro: Não é possivel realizar divisão por zero!");
          }
          break;
        default:
          alert("Operação inválida! Por favor, digite uma operação válida (+, -, *, /).");
      }
    </script>

</body>
</html>
