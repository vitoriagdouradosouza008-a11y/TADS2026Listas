<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O vizinho</title>
</head>
<body>
    
  <h1>O vizinho</h1>
  <p>Antecessor e Sucessor!</p>

  <script>
    let numero = prompt("Digite um número:");
    let antecessor = Number(numero) - 1;
    let sucessor = Number(numero) + 1;
    alert("O número digitado é " + numero + ". O antecessor é " + antecessor + " e o sucessor é " + sucessor + ".")
  </script>

</body>
</html>
