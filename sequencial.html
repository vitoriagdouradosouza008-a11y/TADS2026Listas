<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medidas de um terreno</title>
</head>
<body>
    
  <h1>Medidas de um terreno</h1>
  <p>Quando começa a obra?</p>

  <script>
    let comprimento = prompt("Digite o comprimento do terreno:");
    let largura = prompt("Digite a largura do terreno:");
    let area = Number(comprimento) * Number(largura);
    let perimetro = 2 * (Number(comprimento) + Number(largura));
    alert("A área do terreno é " + area + " metros quadrados e o perímetro é " + perimetro + " metros.");
  </script>
    
</body>
</html>
