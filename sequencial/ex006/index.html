<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperatura Global</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
   
  <h1>Temperatura Global</h1>
  <p>Tá calor aí?</p>

  <script>
    let celsius = prompt("Digite a temperatura em Celcius:");
    let fahrenheit = (Number(celsius) * 9/5) + 32;
    alert(celsius + "°C é igual a " + fahrenheit + "°F.");
  </script>

</body>
</html>
