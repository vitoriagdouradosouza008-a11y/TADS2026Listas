<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantos dias você já viveu?</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    
  <h1>Quantos dias você já viveu?</h1>
  <p>Isso é muito tempo!</p>

  <script>
    let nome = prompt("Digite seu nome:");
    let idade = prompt("Digite sua idade:");
    let diasVividos = Number(idade) * 365;
    alert("Olá " + nome + "! Você já viveu" + " aproximadamente " + diasVividos + " dias!");
  </script>

</body>
</html>
